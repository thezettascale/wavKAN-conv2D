[dependencies]
openssl = ">=3, <3.6"
libstdcxx = ">=3.4,<=15.1"
uv = ">=0.4"
libstdcxx-ng = ">=3.4,<=15.1"
matplotlib = ">=1"

    [dependencies.python]
    channel = "conda-forge"
    build = "*cp*"
    version = "<=3.12,>=3.9,<4, >=3.10,!=3.14.0,!=3.14.1,<4"

[project]
name = ".CondaPkg"
platforms = ["linux-64"]
channels = ["conda-forge"]
channel-priority = "strict"
description = "automatically generated by CondaPkg.jl"

[pypi-dependencies]
jax = ">= 0.5"
numpy = ">= 1, >= 2"
tensorflow = ">= 2.17"
